spring.application.name=notification-service

# Configuration du serveur
server.port=8090

# ===========================
# Configuration PostgreSQL
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/notification_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=773152007

# ===========================
# Configuration JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Eureka Client
# ===========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=true

# ===========================
# Configuration RabbitMQ
# ===========================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ===========================
# Configuration RabbitMQ Queues
# ===========================
rabbitmq.exchange.glycemie=glycemie.exchange
rabbitmq.queue.notification=notification.queue
rabbitmq.routing-key.notification=notification.routing.key

# ===========================
# Configuration Email (Gmail)
# ===========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=azizndoye68@gmail.com
spring.mail.password=jsya bbth edjn eqxz
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===========================
# Configuration SMS (Twilio)
# ===========================
twilio.account-sid=YOUR_ACCOUNT_SID
twilio.auth-token=YOUR_AUTH_TOKEN
twilio.phone-number=+1234567890

# ===========================
# Configuration des seuils de glycémie
# ===========================
glycemie.seuils.hypo-severe=0.50
glycemie.seuils.hypo=0.70
glycemie.seuils.normal-min=0.70
glycemie.seuils.normal-max=1.80
glycemie.seuils.hyper=1.80
glycemie.seuils.hyper-severe=2.50

# ===========================
# Configuration inactivité
# ===========================
glycemie.inactivite.jours-alerte=3

# ===========================
# Configuration Schedulers
# ===========================
scheduler.enabled=true
scheduler.rappel.cron=0 0 */1 * * *
scheduler.inactivite.cron=0 0 1 * * *

# ===========================
# Logging
# ===========================
logging.level.sn.diabete.notification=INFO
logging.level.org.springframework.amqp=DEBUG