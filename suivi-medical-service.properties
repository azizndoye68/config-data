spring.application.name=suivi-medical-service

# Configuration du serveur
server.port=8083

# ===========================
# Configuration PostgreSQL
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/suivi_medical_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=773152007

# ===========================
# Configuration JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Swagger UI (automatique avec springdoc-openapi-starter)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.security=DEBUG
logging.level.sn.diabete.auth=DEBUG
logging.level.io.jsonwebtoken=DEBUG


