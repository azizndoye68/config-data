spring.application.name=communication-service

# ====================================
# Configuration du serveur
# ====================================
server.port=8086

# ✅ Lien direct vers le microservice Auth
# (utilisé uniquement si Eureka est indisponible)
auth-service.url=http://localhost:8081

# ====================================
# Configuration H2
# ====================================
spring.datasource.url=jdbc:h2:mem:communicationdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ====================================
# JPA / Hibernate
# ====================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ====================================
# Console H2
# ====================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ====================================
# Configuration JWT
# ====================================
jwt.secret=MySuperSecretKeyForJwtTokenMySuperSecretKeyForJwtTokenMySuperSecretKeyForJwtToken1234
jwt.expiration=86400000

# ====================================
# Eureka Client
# ====================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Active la découverte via Feign
spring.cloud.discovery.enabled=true
spring.cloud.openfeign.discovery.enabled=true

# ====================================
# Swagger UI
# ====================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ====================================
# Configuration Feign Client
# ====================================
feign.client.config.default.connectTimeout=10000
feign.client.config.default.readTimeout=10000
feign.client.config.default.loggerLevel=full

feign.client.config.auth-service.connectTimeout=10000
feign.client.config.auth-service.readTimeout=10000
feign.client.config.auth-service.loggerLevel=full

# Active la compression des requêtes (utile pour gros payloads)
feign.compression.request.enabled=true
feign.compression.response.enabled=true

# ====================================
# Logging détaillé (debug complet)
# ====================================
logging.level.org.springframework.security=DEBUG
logging.level.sn.diabete.auth=DEBUG
logging.level.io.jsonwebtoken=DEBUG
logging.level.feign=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.sn.diabete.communication.client=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG

# ====================================
# Gestion des erreurs Feign (optionnel)
# ====================================
feign.hystrix.enabled=false
feign.circuitbreaker.enabled=false


