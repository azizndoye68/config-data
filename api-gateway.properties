# Nom de l'application
spring.application.name=api-gateway

# Port du gateway
server.port=8080

# Eureka client (si tu utilises Eureka pour le discovery)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==============================
# Auth Service
# ==============================
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

# ==============================
# Patient Service
# ==============================
# Route principale patient
spring.cloud.gateway.server.webflux.routes[1].id=patient-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://patient-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/patients/**

# Conseils personnalisés
spring.cloud.gateway.server.webflux.routes[2].id=conseil-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://patient-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/conseils/**

# Contenu éducatif
spring.cloud.gateway.server.webflux.routes[3].id=contenu-educatif-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://patient-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/contenus/**

# Dossier médical
spring.cloud.gateway.server.webflux.routes[4].id=dossier-medical-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://patient-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/dossiers/**

# Objectifs santé
spring.cloud.gateway.server.webflux.routes[5].id=objectif-sante-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://patient-service
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/objectifs/**

# ==============================
# Suivi Médical Service
# ==============================
spring.cloud.gateway.server.webflux.routes[6].id=suivi-medical-service
spring.cloud.gateway.server.webflux.routes[6].uri=lb://suivi-medical-service
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/suivis/**

# ==============================
# Medecin Service
# ==============================
# Route principale médecin
spring.cloud.gateway.server.webflux.routes[7].id=medecin-service
spring.cloud.gateway.server.webflux.routes[7].uri=lb://medecin-service
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/medecins/**

# Équipes médicales
spring.cloud.gateway.server.webflux.routes[8].id=equipe-medicale-service
spring.cloud.gateway.server.webflux.routes[8].uri=lb://medecin-service
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/equipes-medicales/**

# Rendez-vous (médecin)
spring.cloud.gateway.server.webflux.routes[9].id=rendezvous-medecin-service
spring.cloud.gateway.server.webflux.routes[9].uri=lb://medecin-service
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/rendezvous/**


# ==============================
# Configuration globale
# ==============================
# Activer la découverte automatique des microservices avec les nouvelles clés
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Logging pour debug
logging.level.org.springframework.cloud.gateway=DEBUG
