spring.application.name=auth-service

# ===========================
# Configuration du serveur
# ===========================
server.port=8081

# ===========================
# Configuration PostgreSQL
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_service_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=773152007

# ===========================
# Configuration JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Configuration JWT
# ===========================
jwt.secret=MySuperSecretKeyForJwtTokenMySuperSecretKeyForJwtTokenMySuperSecretKeyForJwtToken1234

# Access token : 15 minutes
jwt.expiration=900000

# Refresh token : 7 jours
jwt.refresh-expiration=604800000

# Eureka client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=true


# ===========================
# Swagger Configuration
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.security=DEBUG
logging.level.sn.diabete.auth=DEBUG
logging.level.io.jsonwebtoken=DEBUG



